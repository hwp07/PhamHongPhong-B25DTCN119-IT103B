<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Công việc chuẩn bị Tết</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="container">
      <header>
        <h1>Công việc chuẩn bị Tết</h1>
        <p>Click để đánh dấu hoàn thành</p>
      </header>

      <p class="status" id="stats">ppl</p>
      <hr />

      <div class="search">
        <input
          type="text"
          id="search-Input"
          placeholder="Nhập công việc mới..."
        />
        <button id="addBtn">Thêm</button>
        <button id="clearAllBtn" class="clear-all">Xóa toàn bộ</button>
      </div>

      <main>
        <div id="todoList">
          <!-- render todos -->
        </div>
      </main>

      <footer>
        Trạng thái được lưu tự động vào localStorage • Refresh để kiểm tra
      </footer>
    </div>

    <script src="script.js"></script>
  </body>
</html>
