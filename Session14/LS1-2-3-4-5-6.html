<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Danh Sách Sản Phẩm Chợ Tết</h1>
    <ul id="product-list"></ul>
    <form id="product-form">
      <input type="text" id="product-name" placeholder="Tên sản phẩm" />
      <input type="number" id="product-price" placeholder="Giá (VND)" />
      <button type="submit">Thêm sản phẩm</button>
      <br />
      <input type="text" id="search-input" placeholder="Tìm sản phẩm..." />
      <button type="button" id="search">Tìm kiếm</button>
    </form>

    <div class="sort-controls">
      <button class="sort-asc">Sắp xếp giá: Thấp -> Cao</button>
      <button class="sort-desc">Sắp xếp giá: Cao -> Thấp</button>
    </div>
    <script src="LS1-2-3-4-5-6.js"></script>
  </body>
</html>
